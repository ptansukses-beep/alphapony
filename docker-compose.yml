services:
  postgres:
    image: postgres:16
    container_name: alphapony-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: alphapony
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - alphapony-postgres-data:/var/lib/postgresql/data

volumes:
  alphapony-postgres-data:
